<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Detector</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            color: white;
            transition: background 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 42px);
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: clamp(14px, 3vw, 18px);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: clamp(15px, 5vw, 30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .active {
            background: #38bdf8;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .show {
            display: block;
        }

        textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            margin-top: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
        }

        textarea::placeholder, input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button.check-btn {
            margin-top: 25px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #38bdf8;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.check-btn:hover:not(:disabled) {
            background: #0ea5e9;
            transform: scale(1.02);
        }

        button.check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .result {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .percent {
            font-size: 18px;
            opacity: 0.9;
        }

        /* Loader */
        .loader {
            margin: 20px 0;
            display: none;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #38bdf8;
            display: inline-block;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 0.6s infinite alternate;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }

        .footer {
            margin-top: 30px;
            opacity: 0.6;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 AI Content Detector</h1>
    <p class="subtitle">Ստուգիր՝ տեքստը, հղումը կամ նկարը ստեղծվել է AI-ի, թե մարդու կողմից</p>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'text')">📄 Տեքստ</button>
            <button class="tab" onclick="openTab(event, 'link')">🔗 Հղում</button>
            <button class="tab" onclick="openTab(event, 'image')">🖼 Նկար</button>
        </div>

        <!-- TEXT -->
        <div id="text" class="section show">
            <textarea id="textInput" rows="6" placeholder="Գրիր կամ տեղադրիր տեքստ այստեղ (մինիմում 10 բառ)..."></textarea>
            <button id="btnText" class="check-btn" onclick="checkText()">Ստուգել Տեքստը</button>
        </div>

        <!-- LINK -->
        <div id="link" class="section">
            <input type="text" id="linkInput" placeholder="https://example.com/article">
            <button id="btnLink" class="check-btn" onclick="checkLink()">Ստուգել Հղումը</button>
        </div>

        <!-- IMAGE -->
        <div id="image" class="section">
            <input type="file" id="imageInput" accept="image/*">
            <button id="btnImage" class="check-btn" onclick="checkImage()">Ստուգել Նկարը</button>
        </div>

        <!-- LOADER -->
        <div class="loader" id="loader">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <p style="margin-top: 10px; font-size: 14px;">Վերլուծվում է...</p>
        </div>

        <!-- RESULT -->
        <div class="result-box" id="resultBox">
            <div class="result" id="result">Արդյունքը կհայտնվի այստեղ</div>
            <div class="percent" id="percent"></div>
        </div>
    </div>

    <div class="footer">
        School Project • AI Detector Pro • 2026
    </div>
</div>

<script>
    function openTab(evt, tabId) {
        let sections = document.querySelectorAll(".section");
        sections.forEach(s => s.classList.remove("show"));
        document.getElementById(tabId).classList.add("show");

        let tabs = document.querySelectorAll(".tab");
        tabs.forEach(t => t.classList.remove("active"));
        evt.currentTarget.classList.add("active");
    }

    function toggleLoading(isLoading) {
        const loader = document.getElementById("loader");
        const btns = document.querySelectorAll(".check-btn");
        loader.style.display = isLoading ? "block" : "none";
        btns.forEach(b => b.disabled = isLoading);
    }

    function showResult(title, score) {
        const resultDiv = document.getElementById("result");
        const percentDiv = document.getElementById("percent");
        
        resultDiv.innerHTML = title;
        percentDiv.innerHTML = `AI հավանականություն՝ <b>${score}%</b>`;

        // Գույների փոփոխություն ըստ տոկոսի
        if (score >= 70) {
            document.body.style.background = "linear-gradient(135deg, #7f1d1d, #dc2626)"; // Կարմիր (AI)
        } else if (score >= 40) {
            document.body.style.background = "linear-gradient(135deg, #92400e, #d97706)"; // Նարնջագույն (Կասկածելի)
        } else {
            document.body.style.background = "linear-gradient(135deg, #064e3b, #059669)"; // Կանաչ (Մարդ)
        }
    }

    function calculateAIScore(text) {
        const words = text.trim().split(/\s+/);
        if (words.length < 5) return Math.floor(Math.random() * 20); // Շատ կարճ տեքստ

        let score = 0;
        const avgWordLength = text.length / words.length;
        const uniqueWords = new Set(words.map(w => w.toLowerCase()));
        const lexicalDensity = uniqueWords.size / words.length;

        if (avgWordLength > 5.5) score += 35; // Բարդ բառեր
        if (lexicalDensity > 0.8) score += 25; // Բազմազան բառապաշար
        if (words.length > 50) score += 20; // Երկար շարադրանք
        
        // Ավելացնում ենք մի քիչ պատահականություն իրական տեսքի համար
        score += Math.floor(Math.random() * 20);
        return Math.min(score, 100);
    }

    function checkText() {
        const text = document.getElementById("textInput").value;
        if (text.trim().length < 10) {
            alert("Խնդրում ենք մուտքագրել ավելի երկար տեքստ։");
            return;
        }

        toggleLoading(true);
        setTimeout(() => {
            toggleLoading(false);
            const score = calculateAIScore(text);
            let msg = score >= 70 ? "🤖 Հավանաբար AI է" : (score >= 40 ? "⚠️ Կասկածելի բովանդակություն" : "👤 Հավանաբար մարդ է գրել");
            showResult(msg, score);
        }, 1500);
    }

    function checkLink() {
        const link = document.getElementById("linkInput").value;
        if (!link.includes(".")) {
            alert("Խնդրում ենք տեղադրել վավեր հղում։");
            return;
        }

        toggleLoading(true);
        setTimeout(() => {
            toggleLoading(false);
            const score = Math.floor(Math.random() * 100);
            let msg = score >= 50 ? "🤖 Էջում նկատվել են AI հետքեր" : "👤 Էջը հավանական է մարդկային է";
            showResult(msg, score);
        }, 1800);
    }

    function checkImage() {
        const file = document.getElementById("imageInput").files[0];
        if (!file) {
            alert("Խնդրում ենք ընտրել նկար։");
            return;
        }

        toggleLoading(true);
        setTimeout(() => {
            toggleLoading(false);
            const score = Math.floor(Math.random() * 100);
            let msg = score >= 50 ? "🤖 Նկարը ստեղծվել է AI-ով" : "📷 Նկարը իրական լուսանկար է";
            showResult(msg, score);
        }, 2000);
    }
</script>

</body>
</html>
